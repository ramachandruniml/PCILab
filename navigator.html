<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wisconsin Pain Care Navigator</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }

    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 16px;
      background: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0F6E56;
      color: white;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1D9E75; }

    #error { color: red; font-size: 14px; margin-top: 12px; }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 18px;
      margin-top: 14px;
    }
    .card h3 { margin: 0 0 4px; font-size: 16px; }
    .card .meta { font-size: 13px; color: #555; margin-bottom: 8px; }
    .card .desc { font-size: 13px; color: #444; margin-bottom: 10px; line-height: 1.5; }

    .results-title {
      font-size: 14px;
      color: #888;
      margin-top: 28px;
      margin-bottom: 4px;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      margin-top: 30px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <ul>
      <li><a class="active" href="navigator.html">Home</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
  </nav>

  <main class="page-shell">
    <h1>Wisconsin Pain Care Navigator</h1>
    <p class="subtitle">Enter your ZIP code to find nearby pain care resources.</p>

    <label for="zip">ZIP Code</label>
    <input type="text" id="zip" placeholder="e.g. 53703" maxlength="5">

    <button onclick="findCare()">Find Care</button>

    <div id="error"></div>
    <div id="results"></div>
  </main>

  <script>
    const SAMPLE_RESOURCES = [

      {
        name: "UW Health Pain Management Clinic",
        address: "600 Highland Ave, Madison, WI 53792",
        phone: "(608) 263-9550",
        description: "Comprehensive pain management clinic offering multidisciplinary evaluation, procedures, and non-opioid therapies."
      },
      {
        name: "Journey Mental Health Center",
        address: "116 N Hamilton St, Madison, WI 53703",
        phone: "(608) 280-2700",
        description: "Community mental health center providing therapy, crisis support, and psychiatric services."
      },
      {
        name: "National Chronic Pain Support Group",
        address: "1821 S Stoughton Rd, Madison, WI 53716",
        phone: "(800) 910-0664",
        description: "Support group for individuals dealing with chronic pain."
      },
      {
        name: "Epilepsy & Seizures 24/7 Helpline",
        address: "1302 Mendota Street, Madison, WI 53714",
        phone: "(800) 332-1000",
        description: "Helpline for individuals with epilepsy and seizures, offering support and resources."
      },
      {
        name: "Meriter Physical Therapy",
        address: "202 S Park St, Madison, WI 53715",
        phone: "(608) 417-5000",
        description: "Outpatient physical therapy clinic specializing in musculoskeletal pain and chronic pain movement programs."
      },
      {
        name: "Pack Health Digital Health Coaching",
        address: "Online",
        phone: "(855) 255-2362",
        description: "Pack Health is a digital health coaching platform for chronic disease management providing free weekly coaching online and over the phone."
      }
    ];

    function findCare() {
      const zip = document.getElementById("zip").value.trim();

      document.getElementById("error").textContent = "";
      document.getElementById("results").innerHTML = "";

      if (zip.length !== 5 || isNaN(zip)) {
        document.getElementById("error").textContent = "Please enter a valid 5-digit ZIP code.";
        return;
      }

      showResults(SAMPLE_RESOURCES, zip);
    }

    function showResults(resources, zip) {
      const container = document.getElementById("results");

      if (resources.length === 0) {
        container.innerHTML = "<p style='margin-top:20px;color:#666'>No matches found.</p>";
        return;
      }

      container.innerHTML = "<p class='results-title'>" + resources.length + " resources found near " + zip + "</p>";

      resources.forEach(function(resource) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          "<h3>" + resource.name + "</h3>" +
          "<div class='meta'>" + resource.address + " &middot; " + resource.phone + "</div>" +
          "<div class='desc'>" + resource.description + "</div>";

        container.appendChild(card);
      });

      container.innerHTML +=
        "<p class='note'>Using sample data for now. Once a 211 API key is connected, results will be pulled live based on the exact ZIP code entered.</p>";
    }
  </script>
</body>
</html>
