<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wisconsin Pain Care Navigator</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 620px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
      background: #f9f9f7;
    }

    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }

    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }

    input, select {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 16px;
      background: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0F6E56;
      color: white;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1D9E75; }

    #error { color: red; font-size: 14px; margin-top: 12px; }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 18px;
      margin-top: 14px;
    }
    .card h3 { margin: 0 0 4px; font-size: 16px; }
    .card .meta { font-size: 13px; color: #555; margin-bottom: 8px; }
    .card .desc { font-size: 13px; color: #444; margin-bottom: 10px; line-height: 1.5; }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 20px;
      margin-right: 5px;
      margin-bottom: 4px;
    }
    .tag-green  { background: #E1F5EE; color: #0F6E56; }
    .tag-blue   { background: #E6F1FB; color: #185FA5; }
    .tag-orange { background: #FAEEDA; color: #854F0B; }

    .reason {
      font-size: 12px;
      color: #555;
      background: #f3f3f0;
      border-left: 3px solid #1D9E75;
      padding: 7px 10px;
      border-radius: 4px;
      margin-top: 10px;
    }

    .results-title {
      font-size: 14px;
      color: #888;
      margin-top: 28px;
      margin-bottom: 4px;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      margin-top: 30px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <h1>Wisconsin Pain Care Navigator</h1>
  <p class="subtitle">Enter your ZIP code to find nearby pain care resources.</p>

  <label for="zip">ZIP Code</label>
  <input type="text" id="zip" placeholder="e.g. 53703" maxlength="5" />

  <label for="concern">What do you need help with?</label>
  <select id="concern">
    <option value="pain">Chronic Pain</option>
    <option value="sleep">Sleep / Insomnia</option>
    <option value="mental">Mental Health</option>
    <option value="pt">Physical Therapy</option>
  </select>

  <button onclick="findCare()">Find Care</button>

  <div id="error"></div>
  <div id="results"></div>

  <script>

    // ─────────────────────────────────────────────
    // SAMPLE DATA
    // Realistic Wisconsin resources.
    // Replace this with a real 211 API call later.
    // ─────────────────────────────────────────────
    const SAMPLE_RESOURCES = [
      {
        name: "Access Community Health Centers",
        address: "1001 N Marquette St, Madison, WI 53704",
        phone: "(608) 443-5480",
        concerns: ["pain", "mental", "pt", "sleep"],
        insurance: ["medicaid", "medicare", "uninsured", "any"],
        tags: ["Primary Care", "Sliding Fee Scale", "FQHC"],
        tagColors: ["green", "orange", "green"],
        desc: "Federally Qualified Health Center offering primary care, behavioral health, and chronic disease management. Accepts ForwardHealth and uninsured patients on a sliding fee scale.",
        reasons: {
          pain:   "Offers chronic pain management and medication review.",
          mental: "Behavioral health services available on-site.",
          pt:     "Can refer to physical therapy and rehabilitation.",
          sleep:  "Can assess sleep issues and refer to specialists."
        }
      },
      {
        name: "UW Health Pain Management Clinic",
        address: "600 Highland Ave, Madison, WI 53792",
        phone: "(608) 263-9550",
        concerns: ["pain"],
        insurance: ["medicaid", "medicare", "any"],
        tags: ["Pain Specialist", "Multidisciplinary", "Referral Needed"],
        tagColors: ["green", "green", "blue"],
        desc: "Comprehensive pain management clinic offering multidisciplinary evaluation, interventional procedures, and non-opioid therapies including CBT and physical rehabilitation.",
        reasons: {
          pain: "Specializes in chronic pain — offers injections, CBT, and rehab under one roof."
        }
      },
      {
        name: "Journey Mental Health Center",
        address: "116 N Hamilton St, Madison, WI 53703",
        phone: "(608) 280-2700",
        concerns: ["mental", "pain"],
        insurance: ["medicaid", "medicare", "uninsured", "any"],
        tags: ["Mental Health", "Trauma-Informed", "Sliding Fee"],
        tagColors: ["blue", "blue", "orange"],
        desc: "Community mental health center providing therapy, crisis support, and psychiatric services. Trauma-informed care available. ForwardHealth accepted.",
        reasons: {
          mental: "Trauma-informed therapists experienced with pain-related distress and medical invalidation.",
          pain:   "Psychological support for chronic pain patients, including CBT-based approaches."
        }
      },
      {
        name: "Dean Medical Group — Sleep Center",
        address: "1821 S Stoughton Rd, Madison, WI 53716",
        phone: "(608) 395-4900",
        concerns: ["sleep"],
        insurance: ["medicaid", "medicare", "any"],
        tags: ["Sleep Clinic", "CBT-I", "Diagnostic Testing"],
        tagColors: ["blue", "blue", "green"],
        desc: "Accredited sleep center offering CBT for Insomnia (CBT-I), sleep studies, and treatment for sleep disorders. Especially relevant for chronic pain patients with sleep disruption.",
        reasons: {
          sleep: "Offers CBT-I — the gold standard non-drug treatment for insomnia common in chronic pain."
        }
      },
      {
        name: "Meriter Physical Therapy",
        address: "202 S Park St, Madison, WI 53715",
        phone: "(608) 417-5000",
        concerns: ["pt", "pain"],
        insurance: ["medicaid", "medicare", "any"],
        tags: ["Physical Therapy", "Chronic Pain", "Rehab"],
        tagColors: ["green", "green", "green"],
        desc: "Outpatient physical therapy clinic specializing in musculoskeletal pain, post-surgical rehab, and chronic pain movement programs. Most insurances accepted.",
        reasons: {
          pt:   "Outpatient PT with chronic pain specialization.",
          pain: "Movement-based, non-pharmaceutical therapy for long-term pain reduction."
        }
      },
      {
        name: "Dane County Human Services",
        address: "2121 Lien Rd, Madison, WI 53704",
        phone: "(608) 261-9933",
        concerns: ["pain", "mental", "sleep", "pt"],
        insurance: ["uninsured", "medicaid", "any"],
        tags: ["Transportation Help", "Case Management", "SDOH Support"],
        tagColors: ["orange", "orange", "orange"],
        desc: "Connects residents to county transportation services, food assistance, and social support. Helps uninsured and Medicaid patients navigate barriers to accessing care.",
        reasons: {
          pain:   "Can arrange rides to pain care appointments and connect to community resources.",
          mental: "Social support and case management for mental health navigation.",
          sleep:  "Can help with transportation barriers to sleep clinic appointments.",
          pt:     "Transportation coordination to physical therapy sessions."
        }
      }
    ];


    // ─────────────────────────────────────────────
    // MAIN FUNCTION — runs when user clicks button
    // ─────────────────────────────────────────────
    function findCare() {
      const zip     = document.getElementById("zip").value.trim();
      const concern = document.getElementById("concern").value;

      // Clear old results
      document.getElementById("error").textContent = "";
      document.getElementById("results").innerHTML = "";

      // Validate ZIP
      if (zip.length !== 5 || isNaN(zip)) {
        document.getElementById("error").textContent = "Please enter a valid 5-digit ZIP code.";
        return;
      }

      // Filter by concern only
      const matches = SAMPLE_RESOURCES.filter(function(r) {
        return r.concerns.includes(concern);
      });

      showResults(matches, zip, concern);
    }


    // ─────────────────────────────────────────────
    // SHOW RESULTS
    // ─────────────────────────────────────────────
    function showResults(resources, zip, concern) {
      const container = document.getElementById("results");

      if (resources.length === 0) {
        container.innerHTML = "<p style='margin-top:20px;color:#666'>No matches found. Try changing your filters.</p>";
        return;
      }

      container.innerHTML = "<p class='results-title'>" + resources.length + " resources found near " + zip + "</p>";

      resources.forEach(function(r) {

        // Build tag HTML
        const tagHTML = r.tags.map(function(tag, i) {
          const color = r.tagColors[i] || "green";
          return "<span class='tag tag-" + color + "'>" + tag + "</span>";
        }).join("");

        // Build the card
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          "<h3>" + r.name + "</h3>" +
          "<div class='meta'>" + r.address + " &nbsp;·&nbsp; " + r.phone + "</div>" +
          "<div class='desc'>" + r.desc + "</div>" +
          tagHTML +
          "<div class='reason'>Why this result: " + r.reasons[concern] + "</div>";

        container.appendChild(card);
      });


    }

  </script>

</body>
</html>
